name: Publish résumé

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Least-privilege token, plus the scopes GitHub Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialise deploys per ref; a PR build never cancels a main deploy.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # WeasyPrint needs pango/cairo system libs; IBM Plex gives consistent fonts.
      - name: Install WeasyPrint and fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 fonts-ibm-plex
          python3 -m pip install --quiet weasyprint pyyaml

      # content.yaml is the single source of truth; render the site, the print
      # document, and the PDF. Contact details come from repo secrets/vars at
      # build time, never from the source; any unset value is omitted.
      - name: Generate site and résumé PDF
        env:
          PHONE_NUMBER: ${{ secrets.PHONE_NUMBER }}
          EMAIL_ADDRESS: ${{ vars.EMAIL_ADDRESS }}
          HOMEPAGE: ${{ vars.HOMEPAGE }}
        run: python3 build.py

      # Downloadable on every run so the rendered PDF can be reviewed pre-merge.
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: resume.pdf
          if-no-files-found: error

      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp resume.pdf _site/resume.pdf
          cp portrait.jpg _site/portrait.jpg

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    # Only publish from main pushes. PRs run `build` as a check but never deploy.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
