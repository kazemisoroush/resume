name: Publish résumé

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Least-privilege token, plus the scopes GitHub Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two publishes at once; let the newest push win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Contact details live only in repo settings (secrets/vars), never in the
      # source. Fill the placeholders into both the PDF source and the web page.
      # Any unset value renders blank.
      - name: Inject contact details
        env:
          PHONE_NUMBER: ${{ secrets.PHONE_NUMBER }}
          EMAIL_ADDRESS: ${{ vars.EMAIL_ADDRESS }}
          HOMEPAGE: ${{ vars.HOMEPAGE }}
        run: |
          for f in resume.tex index.html; do
            sed -e "s|PHONE_NUMBER_PLACEHOLDER|${PHONE_NUMBER}|g" \
                -e "s|EMAIL_ADDRESS_PLACEHOLDER|${EMAIL_ADDRESS}|g" \
                -e "s|HOMEPAGE_PLACEHOLDER|${HOMEPAGE}|g" \
                "$f" > "${f}.filled"
          done
          mv resume.tex.filled resume_replaced.tex
          mv index.html.filled index.filled.html

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume_replaced.tex

      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.filled.html _site/index.html
          cp resume_replaced.pdf _site/resume.pdf

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
